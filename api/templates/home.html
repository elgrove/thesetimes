{% extends 'base.html' %}

<style>
    #content a:visited {
        color: #ced4da
    }
</style>

{% block content %}

{% for a in articles %}

<h3>
    <a class="link-dark" href="/article/{{ a._id }}">{{ a.title }}</a>
</h3>
{{ a.source }} - {{ a.pubdate|print_date }}
<br>
{{ a.author }}
<br><br><br>

{% endfor %}
{% endblock content %}
