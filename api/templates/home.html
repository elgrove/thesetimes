{% extends 'base.html' %}

<style>
    #content a:visited {
        color: #ced4da
    }
</style>

{% block content %}

{% for a in articles %}

<h3>
    <a class="link-light" href="/article/{{ a._id }}">{{ a.title }}</a>
</h3>
<p class="text-light">{{ a.source }} - {{ a.pubdate|print_date }}
    <br>
    {{ a.author }}

</p>
<br><br>

{% endfor %}
{% endblock content %}
