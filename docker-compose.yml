version: '3.3'
services:
    mongodb:
        ports:
            - '27017:27017'
        volumes:
            - ./db:/data/db
        image: mongo:4
        restart: unless-stopped
        environment:
            - TZ=Europe/London
    api:
        build: ./api
        command: python main.py
        volumes:
        - ./api:/usr/src/app
        ports:
        - 8558:8558
        environment:
            - TZ=Europe/London
    scraper:
        build: ./scraper
        command: python main.py
        volumes:
            - ./scraper:/usr/src/app
        environment:
            - TZ=Europe/London
